<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Creative Studio - Poster Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ed1c24;
            --secondary: #212121;
            --accent: #f5f5f5;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--secondary);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 20%, rgba(237, 28, 36, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(237, 28, 36, 0.1) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 850px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #ffffff, #ed1c24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #aaa;
            font-weight: 300;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            color: #ed1c24;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(237, 28, 36, 0.3);
        }

        button {
            margin-top: 10px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(237, 28, 36, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .preview-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        #posterImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder-text {
            color: #555;
            text-align: center;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--primary);
            border-radius: 50%;
            display: none;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .status-msg {
            margin-top: 10px;
            font-size: 0.8rem;
            text-align: center;
            color: #ed1c24;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Creative Studio</h1>
            <p>AI-Powered Motorcycle Poster Generator</p>
        </div>

        <div class="form-section">
            <div class="input-group">
                <label>Bike Model</label>
                <input type="text" id="bike_model" placeholder="e.g. Hero Xpulse 200 4V" value="Hero Xpulse 200 4V">
            </div>

            <div class="input-group">
                <label>Bike Color</label>
                <input type="text" id="bike_color" placeholder="e.g. Sports Red" value="Mattr Gray">
            </div>

            <div class="input-group">
                <label>Background</label>
                <input type="text" id="background" placeholder="e.g. Himalayan trails"
                    value="Muddy mountain trail at sunset">
            </div>

            <div class="input-group">
                <label>Platform</label>
                <select id="platform">
                    <option value="Instagram">Instagram (Square)</option>
                    <option value="Facebook">Facebook</option>
                    <option value="Twitter">Twitter / X</option>
                    <option value="LinkedIn">LinkedIn</option>
                </select>
            </div>

            <div class="input-group">
                <label>Language</label>
                <select id="language">
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Spanish">Spanish</option>
                </select>
            </div>

            <div class="input-group">
                <label>Dealer Shop Name</label>
                <input type="text" id="dealer_name" placeholder="Dealer Name" value="Hero MotoCorp Ltd.">
            </div>

            <button onclick="generatePoster()" id="genBtn">Generate Poster</button>
            <div id="statusMsg" class="status-msg">Generating your masterpiece...</div>
        </div>

        <div class="preview-section" id="previewBox">
            <div id="loader" class="loader"></div>
            <div id="placeholder" class="placeholder-text">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                    stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 15px; opacity: 0.3;">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <p>Your generated poster will appear here</p>
            </div>
            <img id="posterImage" src="" alt="Generated Poster">
        </div>
    </div>

    <script>
        async function generatePoster() {
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const placeholder = document.getElementById('placeholder');
            const posterImg = document.getElementById('posterImage');
            const statusMsg = document.getElementById('statusMsg');

            // Collect data
            const data = {
                bike_model: document.getElementById('bike_model').value,
                bike_color: document.getElementById('bike_color').value,
                background: document.getElementById('background').value,
                platform: document.getElementById('platform').value,
                language: document.getElementById('language').value,
                dealer_name: document.getElementById('dealer_name').value
            };

            // UI State: Loading
            btn.disabled = true;
            btn.innerText = 'Processing...';
            loader.style.display = 'block';
            placeholder.style.display = 'none';
            posterImg.style.display = 'none';
            statusMsg.style.display = 'block';

            try {
                const response = await fetch('/api/generate-poster', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    if (result.image_url.includes('error')) {
                        statusMsg.innerText = 'Generation failed (AI limits). Using placeholder.';
                        statusMsg.style.color = '#ff9800';
                    } else {
                        statusMsg.innerText = 'Design Completed!';
                        statusMsg.style.color = '#4caf50';
                    }

                    posterImg.src = result.image_url;
                    posterImg.onload = () => {
                        loader.style.display = 'none';
                        posterImg.style.display = 'block';
                        btn.disabled = false;
                        btn.innerText = 'Generate Another';
                    };
                } else {
                    throw new Error(result.detail || 'Generation failed');
                }
            } catch (error) {
                console.error(error);
                alert('Error: ' + error.message);
                loader.style.display = 'none';
                placeholder.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Try Again';
                statusMsg.style.display = 'none';
            }
        }
    </script>
</body>

</html>
